<div>
    <!-- Header -->
    <div class="mb-4 flex justify-between">
        <div class="inline-block">
            <h3 class="font-semibold text-foreground">Cuenta de correo</h3>
            <div class="space-x-1 text-xs font-medium text-muted-foreground">
                <a [routerLink]="['/layout/dashboard/inicio']" class="hover:text-primary">Inicio</a>
                <!-- <span> - Inicio</span> -->
            </div>
        </div>
    </div>
    <!-- end Header -->

    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-12 flex-col rounded-lg bg-background px-8 py-8 sm:flex-row">

            <div class="grid grid-cols-12 gap-4">
                <div class="col-span-12 flex-col rounded-lg bg-background px-4 sm:flex-row">
                    <form autocomplete="off" [formGroup]="form" class="w-full">
                        <div class="grid grid-cols-12 gap-4">
                            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                                <label class="form-label">Nombre del remitente</label>
                                <input pInputText type="text" class="form-control"
                                    placeholder="Ingrese el nombre del remitente" formControlName="NombreRemitente"
                                    class="w-full">
                            </div>

                            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                                <label class="form-label">Contraseña</label>
                                <input pInputText type="text" class="form-control" placeholder="Ingrese la contraseña"
                                    formControlName="Contrasena" class="w-full">
                            </div>

                            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                                <label class="form-label">Servidor SMTP</label>
                                <input pInputText type="text" class="form-control"
                                    placeholder="Ingrese el servidor SMTP" formControlName="ServidorSMTP"
                                    class="w-full">
                            </div>

                            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                                <label class="form-label">Usuario / Correo remitente</label>
                                <input pInputText type="text" class="form-control"
                                    placeholder="Ingrese el correo remitente" formControlName="CorreoRemitente"
                                    class="w-full">
                            </div>

                            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                                <label class="form-label">Asunto del correo</label>
                                <input pInputText type="text" class="form-control"
                                    placeholder="Ingrese el asunto del correo" formControlName="AsuntoCorreo"
                                    class="w-full">
                            </div>

                            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                                <label class="form-label">Puerto</label>
                                <input pInputText type="text" class="form-control" placeholder="Ingrese el puerto"
                                    formControlName="Puerto" class="w-full">
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-4 px-4 mt-4">
                <div class="col-span-12 flex justify-end space-x-4">
                    <button (click)="showGuardar()"
                        class="flex-none rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground">
                        Guardar
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
