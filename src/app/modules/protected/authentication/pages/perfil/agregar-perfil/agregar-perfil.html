<div>
    <!-- Cabecera del modal -->
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-foreground">{{nombre}}</h2>
        <button (click)="cerrar()" class="text-muted-foreground hover:text-foreground transition-colors">
            <span class="text-xl font-bold">×</span>
        </button>
    </div>

    <!-- Formulario -->
    <form autocomplete="off" [formGroup]="miFormulario" (ngSubmit)="guardar()" class="space-y-6">
        <!-- Campo Nombre -->
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
                <label class="form-label fw-semibold">Nombre <span class="text-red-500">*</span></label>
                <input pInputText type="text" formControlName="nombre" placeholder="Nombre del perfil" class="w-full" />
                <!-- Mensajes de error -->
                <p-message severity="error"
                    *ngIf="miFormulario.controls['nombre'].errors?.['required'] && miFormulario.controls['nombre'].touched"
                    class="p-error block">
                    <i class="pi pi-exclamation-circle"></i> El nombre es requerido.
                </p-message>
                <p-message severity="error"
                    *ngIf="miFormulario.controls['nombre'].errors?.['minlength'] && miFormulario.controls['nombre'].touched"
                    class="p-error block">
                    <i class="pi pi-exclamation-circle"></i> El nombre debe tener al menos 3 caracteres.
                </p-message>
                <p-message severity="error"
                    *ngIf="miFormulario.controls['nombre'].errors?.['maxlength'] && miFormulario.controls['nombre'].touched"
                    class="p-error block">
                    <i class="pi pi-exclamation-circle"></i> El nombre no puede tener más de 50 caracteres.
                </p-message>
            </div>
        </div>

        <!-- Sección de permisos -->
        <div class="mt-4">
            <h3 class="text-base font-semibold text-foreground mb-3 flex items-center">
                <span class="h-6 mr-2" style="border-left: 4px solid #2563EB;"></span> Asignar permisos
            </h3>
            <!-- Panel de permisos (componente hijo) siempre ocupa 12 columnas -->
            <div *ngIf="listaSecciones.length !== 0 && listaSeccionesAgrupadas.length !== 0" class="col-span-12 pt-0">
                <app-pnl-perfil-permiso [listaSeccionesAgrupadas]="listaSeccionesAgrupadas" [action]="'ADD'"
                    (eventSeccionesSeleccionadas)="eventSeccionesSeleccionadas($event)">
                </app-pnl-perfil-permiso>
            </div>
            <!-- Si aún no hay secciones, se muestra un loader o vacío -->
            <div *ngIf="listaSecciones.length === 0" class="text-center py-4 text-muted-foreground text-sm">
                Cargando permisos...
            </div>
        </div>

        <!-- Botones finales -->
        <div class="flex justify-end space-x-3 pt-4 border-t border-border">
            <button type="button" (click)="cerrar()"
                class="rounded-md bg-muted px-4 py-2 text-xs font-semibold text-muted-foreground hover:text-foreground">
                Cancelar
            </button>
            <button type="submit" class="rounded-md bg-primary px-4 py-2 text-xs font-semibold text-primary-foreground">
                Guardar
            </button>
        </div>
    </form>
</div>
