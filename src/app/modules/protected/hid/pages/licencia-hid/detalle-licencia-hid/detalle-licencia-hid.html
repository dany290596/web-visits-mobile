<div>
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-foreground">{{nombre}}</h2>
        <button (click)="cerrar()" class="text-muted-foreground hover:text-foreground transition-colors">
            <span class="text-xl font-bold">×</span>
        </button>
    </div>

    @if(data !== undefined && data !== null){
    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
            {{data.nombre}}
        </div>

        <div class="col-span-12 md:col-span-6 xl:col-span-3 pt-0">
            <label class="block text-sm font-medium text-muted-foreground">Estado</label>
            <p-tag [value]="data.estadoDescripcion" [severity]="data.estado === 1 ? 'success' : 'danger'" />
        </div>
    </div>

    <div class="grid grid-cols-12 gap-4 text-xs text-muted-foreground border-t pt-4 mt-4">
        <div class="col-span-12 md:col-span-6">
            <span class="font-medium">Creado:</span> {{ data.fechaCreacion | date:'dd/MM/yyyy HH:mm' }}
            @if (data.usuarioCreadorId) {
            }
        </div>
        @if (data.fechaModificacion) {
        <div class="col-span-12 md:col-span-6">
            <span class="font-medium">Modificado:</span> {{ data.fechaModificacion | date:'dd/MM/yyyy HH:mm' }}
        </div>
        }
    </div>
    }

    <div class="flex justify-end space-x-3 pt-4 border-t border-border">
        <button type="button" (click)="cerrar()"
            class="rounded-md bg-primary px-4 py-2 text-xs font-semibold text-primary-foreground">
            Cerrar
        </button>
    </div>
</div>
